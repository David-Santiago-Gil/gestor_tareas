<header>
    <img class="logo-click" (click)="irAInicio.emit()" src="img/logo-futurista.png" alt="Gestor de Tareas">
    <div class="logo-click" (click)="irAInicio.emit()">
        <h1>TAREA FACIL</h1>
        <p>Administrador de Tareas ADSO</p>
    </div>

    <div class="sesion-info">
      @if (auth.estaAutenticado()) {
        <button class="usuario-badge" (click)="abrirPerfil.emit()" title="Administrar Perfil">
          <img src="img/icono-admin.png" alt="" class="icono-mini"> {{ auth.adminActual()?.username }}
        </button>
        <button class="btn-logout" (click)="auth.logout()">Cerrar Sesión</button>
      } @else {
        <button class="btn-login-header" (click)="abrirLogin.emit()"><img src="img/icono-login.png" alt="" class="icono-mini"> Iniciar Sesión</button>
      }
    </div>
</header>
