<header>
    <div class="logo-wrapper" (click)="irAInicio.emit()">
      <app-logo-animado></app-logo-animado>
    </div>
    <div class="logo-click" (click)="irAInicio.emit()">
        <h1>TAREA FACIL</h1>
        <p>Administrador de Tareas ADSO</p>
    </div>

    <div class="sesion-info">
      @if (auth.estaAutenticado()) {
        <button class="btn-gestion-usuarios" (click)="abrirGestionUsuarios.emit()" title="Gestión de Usuarios">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom:-3px; margin-right:4px;"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
          Usuarios
        </button>
        <button class="usuario-badge" (click)="abrirPerfil.emit()" title="Administrar Perfil">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom:-3px; margin-right:4px;"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
          {{ auth.adminActual()?.username }}
        </button>
        <button class="btn-logout" (click)="auth.logout()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom:-3px; margin-right:4px;"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
          Cerrar
        </button>
      } @else {
        <button class="btn-login-header" (click)="abrirLogin.emit()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom:-3px; margin-right:4px;"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"></path><polyline points="10 17 15 12 10 7"></polyline><line x1="15" y1="12" x2="3" y2="12"></line></svg>
          Iniciar Sesión
        </button>
      }
    </div>
</header>
