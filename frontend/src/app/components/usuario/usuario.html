<app-tarjeta>
    <button [class.active]="seleccionado" (click)="alSeleccionarUsuario()"
            [style.backgroundImage]="usuario.fondoCard ? 'linear-gradient(to right, rgba(15, 10, 25, 0.95) 0%, rgba(15, 10, 25, 0.6) 100%), url(img/' + usuario.fondoCard + ')' : 'none'">
        <img [src]="rutaImagen" [alt]="usuario.nombre" />
        <span>{{ usuario.nombre }}</span>
    </button>
</app-tarjeta>
