<div class="fondo" (click)="alCancelar()"></div>
<dialog open>
    <h2>Agregar Tarea</h2>
    <form (ngSubmit)="alEnviar()">
        <p>
            <label for="titulo">Titulo</label>
            <input type="text" id="titulo" name="titulo" [(ngModel)]="tituloIngresado" />
        </p>

        <p>
            <label for="resumen">Resumen</label>
            <textarea id="resumen" rows="5" name="resumen" [(ngModel)]="resumenIngresado"></textarea>
        </p>

        <p>
            <label for="expira">Fecha Limite</label>
            <input type="date" id="expira" name="expira" [(ngModel)]="fechaIngresado" />
        </p>

        <p>
            <label>Selecciona el Tema / Fondo Anime en 4K</label>
            <span class="bg-grid">
                <span *ngFor="let bg of fondosAvanzados" 
                     class="bg-opcion" 
                     [class.seleccionado]="fondoIngresado === bg.id"
                     (click)="fondoIngresado = bg.id"
                     [title]="bg.nombre">
                     <img [src]="'img/' + bg.id" alt="bg">
                </span>
            </span>
        </p>

        <p class="acciones">
            <button type="button" (click)="alCancelar()">Cancelar</button>
            <button type="submit">Crear</button>
        </p>
    </form>
</dialog>
